name: Force Sync with Upstream Master

on:
  schedule:
    - cron: '0 * * * *'  # 每小时同步一次
  workflow_dispatch:     # 支持手动触发

jobs:
  force-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout your fork (shallow)
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # 拉取全部提交历史，避免报错
          persist-credentials: false

      - name: Set up Git identity
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@users.noreply.github.com"

      - name: Add upstream and fetch
        run: |
          git remote add upstream https://github.com/felixonmars/dnsmasq-china-list.git
          git fetch upstream master

      - name: Reset master to upstream/master
        run: |
          git checkout master
          git reset --hard upstream/master

      - name: Force push to origin master
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git push origin master --force
